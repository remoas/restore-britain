name: OpenClawLarry
options:
  bundleIdPrefix: com.openclawlarry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

packages:
  OpenClawSDK:
    url: https://github.com/openclaw/openclaw-swift-sdk.git
    from: 1.0.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2

targets:
  OpenClawLarry:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    dependencies:
      - package: OpenClawSDK
      - package: KeychainAccess
    settings:
      base:
        INFOPLIST_FILE: Configuration/Info.plist
        CODE_SIGN_ENTITLEMENTS: Configuration/OpenClawLarry.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.openclawlarry.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Configuration/OpenClawLarry.entitlements
      properties:
        com.apple.developer.storekit: true

  OpenClawLarryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: OpenClawLarry
